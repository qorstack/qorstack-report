<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <dir>/usr/local/share/fonts/custom</dir>

  <!-- TH Sarabun New, Angsana New, Cordia New มีไฟล์จริงใน fonts volume แล้ว ไม่ต้อง substitute -->
  <!-- TH SarabunPSK / Browallia New ยังไม่มีไฟล์จริง ให้ fallback ไป Sarabun -->
  <match target="pattern">
    <test qual="any" name="family"><string>TH SarabunPSK</string></test>
    <edit name="family" mode="assign" binding="same"><string>Sarabun</string></edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family"><string>TH SarabunIT๙</string></test>
    <edit name="family" mode="assign" binding="same"><string>Sarabun</string></edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family"><string>Browallia New</string></test>
    <edit name="family" mode="assign" binding="same"><string>Sarabun</string></edit>
  </match>

  <match target="pattern">
    <test qual="any" name="family"><string>Times New Roman</string></test>
    <edit name="family" mode="assign" binding="same"><string>Tinos</string></edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family"><string>Times</string></test>
    <edit name="family" mode="assign" binding="same"><string>Tinos</string></edit>
  </match>

  <match target="pattern">
    <test qual="any" name="family"><string>Arial</string></test>
    <edit name="family" mode="assign" binding="same"><string>Arimo</string></edit>
  </match>

  <match target="pattern">
    <test qual="any" name="family"><string>Courier New</string></test>
    <edit name="family" mode="assign" binding="same"><string>Cousine</string></edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family"><string>Courier</string></test>
    <edit name="family" mode="assign" binding="same"><string>Cousine</string></edit>
  </match>

  <match target="pattern">
    <test qual="any" name="family"><string>Calibri</string></test>
    <edit name="family" mode="assign" binding="same"><string>Carlito</string></edit>
  </match>

  <match target="pattern">
    <test qual="any" name="family"><string>Cambria</string></test>
    <edit name="family" mode="assign" binding="same"><string>Caladea</string></edit>
  </match>

  <alias>
    <family>serif</family>
    <prefer>
      <family>Tinos</family>
      <family>Sarabun</family>
      <family>Noto Serif Thai</family>
    </prefer>
  </alias>

  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Arimo</family>
      <family>Sarabun</family>
      <family>Noto Sans Thai</family>
    </prefer>
  </alias>

  <alias>
    <family>monospace</family>
    <prefer>
      <family>Cousine</family>
      <family>Noto Sans Mono</family>
      <family>Sarabun</family> </prefer>
  </alias>

  <match target="font">
    <edit name="antialias" mode="assign"><bool>true</bool></edit>
    <edit name="hinting" mode="assign"><bool>true</bool></edit>
    <edit name="hintstyle" mode="assign"><const>hintslight</const></edit>
    <edit name="rgba" mode="assign"><const>rgb</const></edit>
    <edit name="lcdfilter" mode="assign"><const>lcddefault</const></edit>
  </match>

</fontconfig>
